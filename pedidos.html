<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="pedidos.css">
    <title>Quest & Dados - Meus Pedidos</title>
</head>

<body>
    <section class="orders">

        <div class="page-header">
            <a onclick="window.history.back()" class="back-btn">←</a>
            <span>←</span>
            </a>

            <h1>Meus Pedidos</h1>
        </div>


        <div class="order-card">

            <div class="order-image">
                <img src="Imagens/GranaAzul.png" alt="">
            </div>

            <div class="order-info">
                <h3>Conjunto de Dados RPG - Grana Azul</h3>
                <p>Pedido #QD001245</p>

                <span class="status delivered">
                    Entregue
                </span>
            </div>

            <div class="order-price">
                <strong>R$ 52,90</strong>
            </div>

        </div>

        <div class="order-card">

            <div class="order-image">
                <img src="Imagens/Crystal.png" alt="">
            </div>

            <div class="order-info">
                <h3>Crystal Saga RPG - Livro de Regras</h3>
                <p>Pedido #QD001246</p>

                <span class="status shipping">
                    Em Transporte
                </span>
            </div>

            <div class="order-price">
                <strong>R$ 59,90</strong>
            </div>

        </div>

        <div class="order-card">

            <div class="order-image">
                <img src="Imagens/Poster.png" alt="Poster de Campanha">
            </div>

            <div class="order-info">
                <h3>Poster de Campanha</h3>
                <p>Pedido #QD001247</p>

                <span class="status processing">
                    Preparando
                </span>
            </div>

            <div class="order-price">
                <strong>R$ 29,90</strong>
            </div>

        </div>

    </section>
</body>

</html>
