<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest & Dados - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <section class="login-page">

        <div class="page-header">
            <h1>Login</h1>
        </div>

        <form class="login-form">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required>

            <a href="senha.html"><span class="forgot-password">Esqueceu a senha?</span></a> 
            <button type="button" onclick="window.location.href='index.html'">Fazer Login</button>
        </form>

        <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a></p>

    </section>
</body>
</html>
