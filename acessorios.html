<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="acessorios.css">   
    <title>Quest & Dados - Acessórios</title>
</head>
<body>
    <section class="accessories-page">

    <div class="page-header">
        <a onclick="window.history.back()" class="back-btn">←</a>
        <h1>Acessórios</h1>
    </div>

    <div class="search-bar">
        <input type="text" placeholder="Buscar acessórios...">
    </div>

    <div class="products-grid">

        <div class="product-card">
            <img src="Imagens/EscudoAnjoDePapelMache.png" alt="">

            <h3>Escudo de Mestre - Anjo de Papel Mache</h3>

            <p>Couro Dobrável Premium</p>

            <span>R$ 89,90</span>
        </div>

        <div class="product-card">
            <img src="Imagens/porta-dados.png" alt="porta-dados">

            <h3>Porta Dados - Mimic</h3>

            <p>Mimic porta dados</p>

            <span>R$ 79,90</span>
        </div>

        <div class="product-card">
            <img src="Imagens/TorredeDados.png" alt="">

            <h3>Torre de Dados - Big Bang</h3>

            <p>Impressão 3D Premium</p>

            <span>R$ 119,90</span>
        </div>

        <div class="product-card">
            <img src="Imagens/contadordevida.webp" alt="Contador de Vida">

            <h3>Contador de Vida</h3>

            <p>Contador de vida para RPG</p>

            <span>R$ 19,90</span>
        </div>

    </div>

</section>
</body>
</html>
