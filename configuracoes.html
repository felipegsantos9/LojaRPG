<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest & Dados - Configurações</title>
  <link rel="stylesheet" href="configuracoes.css">
</head>

<body>
  <section class="settings-page">

    <div class="page-header">
      <a onclick="window.history.back()" class="back-btn">←</a>
      <h1>Configurações</h1>
    </div>

    <ul class="settings-list">
      <li>
        <span>Alterar idioma</span>
        <select>
          <optgroup label="Idiomas">
          <option>Português (Brasil)</option>
          <option>English</option>
          <option>Español</option>
          <option>Français</option>
          <option>Deutsch</option>
          <option>Italiano</option>
          </optgroup>
          <optgroup label="Outros idiomas">
            <option>中文 (简体)</option>
            <option>日本語</option>
            <option>한국어</option>
            <option>Русский</option>
            <option>العربية</option>
          </optgroup>
        </select>
      </li>

      <li>
        <span>Notificações</span>
        <input type="checkbox">
      </li>

      <li>
        <span>Gerenciar conta</span>
        <button>Abrir</button>
      </li>

      <li>
        <span>Privacidade</span>
        <button>Configurar</button>
      </li>

      <li>
        <span>Segurança</span>
        <a href="./senha.html"><button>Alterar senha</button></a>
      </li>

      <li>
        <span>Acessibilidade</span>
        <button>Opções</button>
      </li>

      <li>
        <span>Ajuda</span>
        <button>Suporte</button>
      </li>

      <li>
        <span>Sobre o aplicativo</span>

        <a href="./versao.html">
          <button>Versão</button>
        </a>
      </li>
    </ul>

  </section>
</body>

</html>
