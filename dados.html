<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dados.css">
    <title>Quest & Dados - Dados</title>
</head>
<body>


<section class="dice-page">

    <div class="page-header">
        <a onclick="window.history.back()" class="back-btn">←</a>
        <h1>Dados RPG</h1>
    </div>

    <div class="search-bar">
        <input type="text" placeholder="Buscar dados...">
    </div>

    <div class="products-grid">

        <div class="product-card">
            <img src="Imagens/SunsetShimmerDados.png" alt="">
            <h3>Dados Sunset Shimmer</h3>
            <p>Conjunto + 1D20 extra</p>
            <span>R$ 75,00</span>
        </div>

        <div class="product-card">
            <img src="Imagens/CeloDados.png" alt="">
            <h3>Dados Marcelo "Out of Context"</h3>
            <p>Conjunto + 1D20 extra</p>
            <span>R$ 75,00</span>
        </div>

        <div class="product-card">
            <img src="Imagens/TwilightSparkleDados.png" alt="">
            <h3>Dados Twilight Sparkle</h3>
            <p>Conjunto + 1D20 extra</p>
            <span>R$ 80,00</span>
        </div>

        <div class="product-card">
            <img src="Imagens/RainbowDashDados.png" alt="">
            <h3>Dados Rainbow Dash</h3>
            <p>Conjunto + 1D20 extra</p>
            <span>R$ 57,00</span>
        </div>

    </div>

</section>

</body>
</html>
