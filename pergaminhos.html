<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="pergaminhos.css">
    <title>Quest & Dados - Pergaminhos</title>
</head>
<body>
    <section class="scrolls-page">

        <div class="page-header">
            <a onclick="window.history.back()" class="back-btn">←</a>
            <h1>Pergaminhos</h1>
        </div>

        <div class="search-bar">
            <input type="text" placeholder="Buscar pergaminhos...">
        </div>

        <div class="products-grid">

            <div class="product-card">
                <img src="Imagens/PergaminhoFogo.png" alt="Pergaminho de Fogo">
                <h3>Pergaminho de Fogo</h3>
                <p>Magia Elemental</p>
                <span>R$ 39,90</span>
            </div>

            <div class="product-card">
                <img src="Imagens/PergaminhoDivino.png" alt="Pergaminho de Cura">
                <h3>Pergaminho de Cura</h3>
                <p>Magia Divina</p>
                <span>R$ 49,90</span>
            </div>

            <div class="product-card">
                <img src="Imagens/PergaminhoMaligno.png" alt="Pergaminho de Ilusão">
                <h3>Pergaminho de Ilusão</h3>
                <p>Magia Arcana</p>
                <span>R$ 44,90</span>
            </div>

            <div class="product-card">
                <img src="Imagens/PergaminhoGelo.png" alt="Pergaminho de Gelo">
                <h3>Pergaminho de Gelo</h3>
                <p>Magia Elemental</p>
                <span>R$ 42,90</span>
            </div>

        </div>

    </section>
</body>
</html>
